# CI — Fase 14.5: build, testes unitários (incl. motor+RLS em Postgres
# real via Supabase CLI) e suíte E2E Playwright.
#
# SEGURANÇA: nenhum secret é necessário. O front usa só chaves
# PÚBLICAS (app/.env.production: URL + anon key, publicáveis por
# design — a segurança é a RLS). A service_role NUNCA entra aqui.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------
  # 1) Build de produção + testes unitários
  #    - regras.test.mjs: lógica pura (sem banco)
  #    - motor/isolamento.test.mjs: motor e RLS contra o Postgres
  #      do Supabase local (mesmas migrations de produção)
  # ------------------------------------------------------------
  build-e-unitarios:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Postgres VANILLA de propósito: a migration 0001 cria as roles
    # (authenticated/anon/service_role) quando faltam, e a 0004 pula o
    # pg_cron quando indisponível — é o desenho do reset-db.sh. O
    # Postgres do Supabase NÃO serve aqui: nele o pg_cron só pode ser
    # criado no database `postgres`, e o teste usa `rumo_teste`.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: "54322"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: rumo_teste
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            tests/package-lock.json

      - name: Instalar dependências (app)
        working-directory: app
        run: npm ci

      - name: Build de produção
        working-directory: app
        run: npm run build

      - name: Instalar dependências (tests)
        working-directory: tests
        run: npm ci

      - name: Migrations + seed (2x — idempotência exercitada)
        working-directory: tests
        run: bash reset-db.sh

      - name: Testes unitários (regras + motor + isolamento RLS)
        working-directory: tests
        run: npm test

  # ------------------------------------------------------------
  # 2) E2E Playwright: o build REAL contra o Supabase de demo.
  #    Os próprios testes validam erros de console (coletarErros).
  # ------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # o banco de demo é COMPARTILHADO e o teste de marca escreve e
    # restaura — nunca duas suítes ao mesmo tempo
    concurrency:
      group: e2e-demo-db
      cancel-in-progress: false
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Apontar E2E para projeto isolado (Fase 17.2, se configurado)
        env:
          E2E_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$E2E_URL" ]; then
            printf 'VITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\n' "$E2E_URL" "$E2E_KEY" > .env.production.local
            echo "E2E isolado: build apontando para o projeto de teste (não toca no demo)."
          else
            echo "::warning::E2E_SUPABASE_URL ausente — E2E roda contra o ambiente padrão (demo). Configure os secrets E2E_SUPABASE_URL / E2E_SUPABASE_ANON_KEY para isolar (ver docs/operacao/e2e-ambiente.md)."
          fi

      - name: Build de produção
        run: npm run build

      - name: Instalar Chromium do Playwright
        run: npx playwright install --with-deps chromium

      - name: Suíte E2E (42 testes, desktop + mobile)
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Publicar relatório (em falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14
