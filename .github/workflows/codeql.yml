# CodeQL — code scanning gratuito (SEG2 / J-3).
# Analisa JavaScript/TypeScript (front em app/ e Edge Functions em
# supabase/functions/) em busca de padrões inseguros. Não depende de
# secret. Roda em PR, em push na main e semanalmente.
#
# Observação: os resultados aparecem em Security > Code scanning do
# repositório. Em repo público o CodeQL é gratuito; se o repo virar
# privado sem GitHub Advanced Security, este workflow pode ser desligado
# (remover o arquivo) — está documentado em
# docs/auditoria/seg2/02-github-branch-protection-security.md.
name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "27 4 * * 1" # toda segunda, 04:27 UTC

jobs:
  analyze:
    name: Analisar (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Análise CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
