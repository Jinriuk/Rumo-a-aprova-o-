# E2E (Playwright) — Fase 14.5: roda a suíte a cada push.
# Os testes dirigem o BUILD REAL contra o Supabase de demonstração
# (anon key pública em app/.env.production; a segurança é a RLS).
#
# Atenção: o banco de demo é COMPARTILHADO e o teste de marca
# escreve e restaura — `concurrency` garante uma execução por vez.
name: E2E

on:
  push:
  workflow_dispatch:

concurrency:
  group: e2e-demo-db # banco compartilhado: nunca duas suítes ao mesmo tempo
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium do Playwright
        run: npx playwright install --with-deps chromium

      - name: Rodar suíte E2E (build + preview + testes)
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Publicar relatório (em falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14
