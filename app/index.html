<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- o aluno usa no celular: viewport e safe-area desde o início -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A1622" />
    <!-- Favicon inline (data URI) — evita o request automático a /favicon.ico
         que retorna 404 no preview/local (e HTML pelo rewrite na Vercel),
         sujando o console. SVG inline é permitido pela CSP (img-src data:). -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230A1622'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle' fill='%23CDA349'%3E%E2%9A%93%3C/text%3E%3C/svg%3E" />
    <title>Painel de Estudos</title>
  </head>
